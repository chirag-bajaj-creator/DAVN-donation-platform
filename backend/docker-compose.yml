services:
  backend:
    build: .
    container_name: dawn-backend-container
    env_file:
      - .env
    ports:
      - "5002:5002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
