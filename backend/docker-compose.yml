services:
  backend:
    build: .
    container_name: dawn-backend-container
    env_file:
      - .env
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s